<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ページが見つかりません | SnapEnglish</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" sizes="64x64" href="/icon-64.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png">
  <script>
    (function() {
      var stored = localStorage.getItem('theme');
      var isDark = stored === 'dark' || (stored !== 'light' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (isDark) document.documentElement.classList.add('dark');
    })();
  </script>
  <link rel="stylesheet" href="/tailwind.css">
</head>
<body class="bg-white text-slate-800 antialiased min-h-screen flex flex-col dark:bg-slate-900 dark:text-slate-100">
  <!-- 背景装飾 -->
  <div class="fixed inset-0 -z-10 overflow-hidden">
    <div class="absolute -top-40 -right-40 w-96 h-96 bg-teal-100 rounded-full blur-3xl opacity-60 dark:bg-teal-900/40"></div>
    <div class="absolute top-1/2 -left-40 w-80 h-80 bg-emerald-100 rounded-full blur-3xl opacity-50 dark:bg-emerald-900/40"></div>
  </div>

  <header class="px-6 py-5">
    <a href="/" class="inline-flex items-center gap-2 text-lg font-bold">
      <img src="/icon-64.png" alt="" aria-hidden="true" class="w-8 h-8 rounded-lg shadow-sm">
      <span><span style="color: #2E8752">Snap</span><span class="text-slate-800 dark:text-slate-100">English</span></span>
    </a>
  </header>

  <main class="flex-1 flex items-center justify-center px-6">
    <div class="max-w-lg text-center">
      <p class="text-7xl sm:text-8xl font-extrabold bg-gradient-to-r from-teal-600 to-emerald-600 bg-clip-text text-transparent mb-4">404</p>
      <h1 class="text-2xl sm:text-3xl font-bold text-slate-900 mb-4 dark:text-slate-50">ページが見つかりません</h1>
      <p class="text-slate-600 leading-relaxed mb-8 dark:text-slate-300">
        お探しのページは移動・削除されたか、URL が誤っている可能性があります。
      </p>
      <a href="/" class="inline-flex items-center gap-2 px-6 py-3 rounded-full bg-slate-900 text-white text-sm font-medium hover:bg-slate-800 transition">
        トップページへ戻る
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
      </a>
    </div>
  </main>

  <footer class="px-6 py-6 text-center text-xs text-slate-400 dark:text-slate-500">
    © <span id="year">2026</span> SnapTechEdge
  </footer>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
